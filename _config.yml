# Welcome to Jekyll!
# Site configuration file

# -------------------
# Site Settings
# -------------------

locale: "zh-CN"
title: "MF Wei / Homepage"
title_separator: "-"
name: "MF Wei"
description: "I'm a student from Nanjing University."

url: "https://WeiMF-21.github.io"
baseurl: ""

repository: "WeiMF-21/WeiMF-21.github.io"

teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false


# -------------------
# Comments
# -------------------

comments:
  provider: false


# -------------------
# Staticman
# -------------------

staticman:
  allowedFields: ['name','email','url','message']
  branch: "gh-pages"
  commitMessage: "New comment."
  filename: comment-{@timestamp}
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields: ['name','email','message']
  transforms:
    email: "md5"
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601"


# -------------------
# Atom Feed
# -------------------

atom_feed:
  path:


# -------------------
# SEO
# -------------------

google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:


# -------------------
# Social Sharing
# -------------------

twitter:
  username:

facebook:
  username:
  app_id:
  publisher:

og_image:


# Social profile links
social:
  type: "Person"
  name: "MF Wei"
  links:
    - https://github.com/WeiMF-21


# -------------------
# Analytics
# -------------------

analytics:
  provider: false
  google:
    tracking_id:


# -------------------
# Author
# -------------------

author:
  name: "MF Wei"
  avatar:
  bio: "南京大学大数据传播实验班2024级本科生"
  location: "中国南京"
  employer: "南京大学"
  email: "241051020@smail.nju.edu.cn"

  github: "WeiMF-21"

  googlescholar:
  researchgate:
  linkedin:
  orcid:


# -------------------
# Reading Files
# -------------------

include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# -------------------
# Conversion
# -------------------

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# -------------------
# Markdown Processing
# -------------------

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# -------------------
# Collections
# -------------------

collections:
  teaching:
    output: true
    permalink: /:collection/:path/

  publications:
    output: true
    permalink: /:collection/:path/

  portfolio:
    output: true
    permalink: /:collection/:path/

  talks:
    output: true
    permalink: /:collection/:path/


# -------------------
# Defaults
# -------------------

defaults:

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comments: true

  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true


# -------------------
# Sass
# -------------------

sass:
  sass_dir: _sass
  style: compressed


# -------------------
# Output
# -------------------

permalink: /:categories/:title/

timezone: Asia/Shanghai


# -------------------
# Plugins
# -------------------

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji


# -------------------
# Archives
# -------------------

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/


# -------------------
# HTML Compression
# -------------------

compress_html:
  clippings: all
  ignore:
    envs: development
